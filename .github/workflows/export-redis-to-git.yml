# Ce workflow GitHub Actions exporte la dernière version de Redis et met à jour le dépôt automatiquement.
# Il se déclenche sur un push d'un fichier signal (ex: .trigger-export) ou manuellement.

name: Export Redis to Git (auto)

on:
  workflow_dispatch:
  push:
    paths:
      - '.trigger-export'

jobs:
  export-redis-to-git:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Export Redis to data.structure.js
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node export-redis-to-git.cjs

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.structure.js
          git commit -m "[auto] Export Redis data via GitHub Actions" || echo "No changes to commit"
          git push
